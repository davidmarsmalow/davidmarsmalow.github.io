<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- UP -->
  <symbol id="key-up" viewBox="0 0 40 44">
    <rect x="2" y="4" width="36" height="38" rx="6" fill="#94a3b8" stroke="#cbd5e1"/>
    <rect x="2" y="2" width="36" height="34" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
    <rect x="6" y="5" width="28" height="24" rx="4" fill="#f1f5f9" fill-opacity="0.5"/>
    <text x="20" y="24" text-anchor="middle" font-size="16"
      font-family="'Press Start 2P', monospace" fill="#475569">↑</text>
  </symbol>

  <!-- DOWN -->
  <symbol id="key-down" viewBox="0 0 40 44">
    <rect x="2" y="4" width="36" height="38" rx="6" fill="#94a3b8" stroke="#cbd5e1"/>
    <rect x="2" y="2" width="36" height="34" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
    <rect x="6" y="5" width="28" height="24" rx="4" fill="#f1f5f9" fill-opacity="0.5"/>
    <text x="20" y="24" text-anchor="middle" font-size="16"
      font-family="'Press Start 2P', monospace" fill="#475569">↓</text>
  </symbol>

  <!-- LEFT -->
  <symbol id="key-left" viewBox="0 0 40 44">
    <rect x="2" y="4" width="36" height="38" rx="6" fill="#94a3b8" stroke="#cbd5e1"/>
    <rect x="2" y="2" width="36" height="34" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
    <rect x="6" y="5" width="28" height="24" rx="4" fill="#f1f5f9" fill-opacity="0.5"/>
    <text x="20" y="24" text-anchor="middle" font-size="16"
      font-family="'Press Start 2P', monospace" fill="#475569">←</text>
  </symbol>

  <!-- RIGHT -->
  <symbol id="key-right" viewBox="0 0 40 44">
    <rect x="2" y="4" width="36" height="38" rx="6" fill="#94a3b8" stroke="#cbd5e1"/>
    <rect x="2" y="2" width="36" height="34" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
    <rect x="6" y="5" width="28" height="24" rx="4" fill="#f1f5f9" fill-opacity="0.5"/>
    <text x="20" y="24" text-anchor="middle" font-size="16"
      font-family="'Press Start 2P', monospace" fill="#475569">→</text>
  </symbol>

  <!-- ENTER -->
  <symbol id="key-enter" viewBox="0 0 80 44">
    <rect x="2" y="4" width="76" height="38" rx="6" fill="#0e7490" stroke="#0891b2"/>
    <rect x="2" y="2" width="76" height="34" rx="6" fill="#22d3ee" stroke="#0891b2"/>
    <rect x="8" y="5" width="64" height="24" rx="4" fill="#67e8f9" fill-opacity="0.5"/>
    <text x="40" y="24" text-anchor="middle" font-size="10"
      font-family="'Press Start 2P', monospace" fill="#0891b2">ENTER</text>
  </symbol>

  <!-- ESC -->
  <symbol id="key-esc" viewBox="0 0 60 44">
    <rect x="2" y="4" width="56" height="38" rx="6" fill="#b91c1c" stroke="#dc2626"/>
    <rect x="2" y="2" width="56" height="34" rx="6" fill="#f87171" stroke="#dc2626"/>
    <rect x="8" y="5" width="44" height="24" rx="4" fill="#fca5a5" fill-opacity="0.4"/>
    <text x="30" y="24" text-anchor="middle" font-size="11"
      font-family="'Press Start 2P', monospace" fill="#7f1d1d">ESC</text>
  </symbol>

</svg>